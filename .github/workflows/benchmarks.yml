name: Benchmarks

on:
  push:
    branches: [master]
    paths:
      - 'benchmarks/**'
  pull_request:
    paths:
      - 'benchmarks/**'
  workflow_dispatch:
    inputs:
      benchmark_target:
        description: 'Specific benchmark target to run (e.g. benchmarks/NonStiffODE or benchmarks/NonStiffODE/linear_wpd.jmd). Leave empty to detect from changes.'
        required: false
        type: string

# NOTE: Workflow-level concurrency was removed because it caused deadlocks.
# When a benchmark job was queued (waiting for a self-hosted runner) but not yet
# in_progress, cancel-in-progress could not cancel it. This blocked new runs
# from even starting their detect-changes job on ubuntu-latest.
# Concurrency is now handled per-job: detect-changes runs freely, and each
# benchmark target has its own concurrency group so new commits cancel stale
# queued jobs for the same target.

permissions:
  actions: write
  contents: read

jobs:
  # Cancel previous workflow runs for the same PR/branch.
  # This handles the case where a previous run's benchmark job is queued
  # (waiting for a self-hosted runner) — workflow-level cancel-in-progress
  # cannot cancel queued-but-not-started jobs, so we do it explicitly.
  cancel-outdated:
    name: Cancel Previous Runs
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    steps:
      - name: Cancel outdated runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          workflow_id: benchmarks.yml
          access_token: ${{ github.token }}

  detect-changes:
    name: Detect Changed Benchmarks
    runs-on: ubuntu-latest
    needs: [cancel-outdated]
    # Run even if cancel-outdated was skipped (master push) or succeeded
    if: |
      always() &&
      needs.cancel-outdated.result != 'failure' &&
      (github.event.inputs.benchmark_target == '' || github.event.inputs.benchmark_target == null)
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed benchmarks
        id: detect
        run: .github/scripts/detect-changed-benchmarks.sh

  # When manually triggered with a specific target
  manual-matrix:
    name: Manual Target
    runs-on: ubuntu-latest
    needs: [cancel-outdated]
    if: |
      always() &&
      needs.cancel-outdated.result != 'failure' &&
      github.event.inputs.benchmark_target != '' && github.event.inputs.benchmark_target != null
    outputs:
      matrix: ${{ steps.manual.outputs.matrix }}
      has_changes: ${{ steps.manual.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
      - name: Set manual target
        id: manual
        run: |
          target="${{ github.event.inputs.benchmark_target }}"
          source .github/scripts/read-benchmark-config.sh
          config=$(get_benchmark_config "${target}")
          runner=$(echo "${config}" | cut -d'|' -f1)
          timeout=$(echo "${config}" | cut -d'|' -f2)
          julia_version=$(echo "${config}" | cut -d'|' -f3)
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix=[{\"target\":\"${target}\",\"runner\":${runner},\"timeout\":${timeout},\"julia_version\":\"${julia_version}\"}]" >> "$GITHUB_OUTPUT"

  benchmark:
    name: "Run: ${{ matrix.target }}"
    needs: [detect-changes, manual-matrix]
    # Run if either job produced changes (the other will be skipped)
    if: |
      always() && (
        (needs.detect-changes.result == 'success' && needs.detect-changes.outputs.has_changes == 'true') ||
        (needs.manual-matrix.result == 'success' && needs.manual-matrix.outputs.has_changes == 'true')
      )
    runs-on: ${{ matrix.runner }}
    # Per-target concurrency: new commits cancel queued/running benchmarks for
    # the same target on the same branch, but different targets run in parallel.
    # Master is excluded so long-running publish-bound benchmarks are not cancelled.
    concurrency:
      group: bench-${{ matrix.target }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix || needs.manual-matrix.outputs.matrix) }}
      fail-fast: false
    timeout-minutes: ${{ matrix.timeout }}
    env:
      JULIA_NUM_THREADS: auto
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia_version }}

      - uses: julia-actions/cache@v2

      - name: Build benchmark
        run: .github/scripts/build_benchmark.sh "${{ matrix.target }}"
        env:
          JULIAHUB_TOKEN: ${{ secrets.JULIAHUB_TOKEN }}

      - name: Sanitize artifact name
        if: always()
        id: artifact-name
        run: |
          name=$(echo "${{ matrix.target }}" | tr '/' '-' | tr '.' '-')
          echo "name=benchmark-${name}" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            markdown/
            notebook/
            pdf/
            script/
          retention-days: 30

  publish:
    name: Publish Results
    needs: benchmark
    if: always() && github.ref == 'refs/heads/master' && needs.benchmark.result == 'success'
    runs-on: [self-hosted, benchmark]
    concurrency:
      group: scimlbenchmarks-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          merge-multiple: true

      - name: Publish to SciMLBenchmarksOutput
        run: .github/scripts/publish_benchmark_output.sh
        env:
          DEPLOY_KEY: ${{ secrets.SCIML_BENCHMARKS_DEPLOY_KEY }}
